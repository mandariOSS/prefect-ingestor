# =============================================================================
# Mandari Prefect Ingestor — Docker-Compose
# =============================================================================
# Startet:
#   - postgres         Datenbank (mit Healthcheck)
#   - api              FastAPI (OParl + Management-API), führt Migrationen
#                      beim Start aus, Healthcheck über /health/live
#   - scheduler        Sync-Loop (alle SYNC_INTERVAL_MINUTES), täglicher
#                      Full-Sync, Source-Seed beim ersten Start
#   - ocr-worker       PDF-Textextraktion (Hintergrund)
#   - geocoding-worker Dedizierter Nominatim-Consumer (1 Request alle
#                      GEOCODING_INTERVAL_SECONDS, default 5 s) — strikt
#                      seriell, hält die Public-Nominatim-Usage-Policy ein.
#                      Nutzt per Default https://nominatim.openstreetmap.org;
#                      eigene Instanz via NOMINATIM_URL überschreibbar.
# =============================================================================

name: mandari-ingestor

services:
  # ===========================================================================
  # PostgreSQL
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ingestor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ingestor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ingestor_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ingestor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ingestor}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ingestor

  # ===========================================================================
  # FastAPI — OParl-API + Management-API
  # ===========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: mandari-ingestor:dev
    container_name: ingestor-api
    restart: unless-stopped
    command: ["ingestor-api"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ingestor}:${POSTGRES_PASSWORD:-ingestor_dev}@postgres:5432/${POSTGRES_DB:-ingestor}
      API_KEY: ${API_KEY:-dev-key}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: console
      PREFECT_API_URL: ""
    ports:
      - "${API_PORT:-9080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ingestor

  # ===========================================================================
  # Scheduler — periodischer Sync-Loop (ohne Prefect-Server)
  # Incremental alle SYNC_INTERVAL_MINUTES, Full-Sync täglich FULL_SYNC_HOUR UTC
  # ===========================================================================
  scheduler:
    image: mandari-ingestor:dev
    container_name: ingestor-scheduler
    restart: unless-stopped
    command: ["ingestor-scheduler"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ingestor}:${POSTGRES_PASSWORD:-ingestor_dev}@postgres:5432/${POSTGRES_DB:-ingestor}
      PREFECT_API_URL: ""
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES:-10}
      FULL_SYNC_HOUR: ${FULL_SYNC_HOUR:-3}
      SYNC_BODY_CONCURRENCY: ${SYNC_BODY_CONCURRENCY:-4}
      SYNC_QUARANTINE_THRESHOLD: ${SYNC_QUARANTINE_THRESHOLD:-10}
      ENRICHMENT_AUTO_PHOTOS: ${ENRICHMENT_AUTO_PHOTOS:-true}
      # Geocoding läuft im dedizierten geocoding-worker, NICHT im scheduler.
      # ENRICHMENT_AUTO_GEOCODING wird vom Sync-Flow ignoriert (legacy).
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      disable: true
    networks:
      - ingestor

  # ===========================================================================
  # OCR-Worker — Eigenständiger Service für PDF-Textextraktion
  # ===========================================================================
  ocr-worker:
    image: mandari-ingestor:dev
    container_name: ingestor-ocr-worker
    restart: unless-stopped
    command: ["ingestor-ocr"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ingestor}:${POSTGRES_PASSWORD:-ingestor_dev}@postgres:5432/${POSTGRES_DB:-ingestor}
      PREFECT_API_URL: ""
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OCR_BATCH_SIZE: ${OCR_BATCH_SIZE:-30}
      OCR_CONCURRENCY: ${OCR_CONCURRENCY:-2}
      # KI-API OCR Stufe 3 (optional, jede OpenAI-kompatible API)
      OCR_AI_API_KEY: ${OCR_AI_API_KEY:-}
      OCR_AI_BASE_URL: ${OCR_AI_BASE_URL:-https://api.mistral.ai/v1}
      OCR_AI_MODEL: ${OCR_AI_MODEL:-mistral-ocr-latest}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      disable: true
    mem_limit: 1g
    networks:
      - ingestor

  # ===========================================================================
  # Geocoding-Worker — Dedicated Nominatim consumer (rate-limited).
  # Macht 1 Request alle GEOCODING_INTERVAL_SECONDS (default 5 s) — strikt
  # seriell, ein einziger asyncio-Loop mit shared httpx.AsyncClient. Pickt
  # Locations ohne lat/lon aus der DB und schreibt Koordinaten zurück.
  # Hält die Public-Nominatim-Usage-Policy (≤ 1 Req/s) sicher ein.
  # ===========================================================================
  geocoding-worker:
    image: mandari-ingestor:dev
    container_name: ingestor-geocoding-worker
    restart: unless-stopped
    command: ["ingestor-geocoding"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ingestor}:${POSTGRES_PASSWORD:-ingestor_dev}@postgres:5432/${POSTGRES_DB:-ingestor}
      PREFECT_API_URL: ""
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GEOCODING_ENABLED: ${GEOCODING_ENABLED:-true}
      # Default 5 s gibt Public-Nominatim 5x mehr Luft als gefordert (1/s).
      # Eigene Instanz: deutlich kleiner setzen (z.B. 0.1).
      GEOCODING_INTERVAL_SECONDS: ${GEOCODING_INTERVAL_SECONDS:-5}
      GEOCODING_BATCH_SIZE: ${GEOCODING_BATCH_SIZE:-50}
      GEOCODING_IDLE_SLEEP_SECONDS: ${GEOCODING_IDLE_SLEEP_SECONDS:-60}
      NOMINATIM_URL: ${NOMINATIM_URL:-https://nominatim.openstreetmap.org}
      # Pflichtfeld nach Nominatim Usage Policy — identifiziert die App
      # und liefert Kontakt im Missbrauchsfall. Niemals leer lassen.
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT:-Mandari-Ingestor/0.1 (kontakt@mandari.de)}
      NOMINATIM_EMAIL: ${NOMINATIM_EMAIL:-kontakt@mandari.de}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      disable: true
    mem_limit: 256m
    networks:
      - ingestor

volumes:
  postgres_data:
    name: mandari_ingestor_postgres

networks:
  ingestor:
    driver: bridge
